name: Brand Intelligence — Monthly Run

on:
  schedule:
    - cron: "0 7 1 * *"   # 6am UTC on 1st of every month

  workflow_dispatch:
    inputs:
      month:
        description: "Month to process (YYYY-MM). Leave blank for previous month."
        required: false
        default: ""
      mode:
        description: "Which module to run: both | search | llm"
        required: false
        default: "both"
      dry_run:
        description: "Dry run? (true/false)"
        required: false
        default: "false"

jobs:
  run:
    name: Fetch & Store Brand Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run brand intelligence tracker
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.month }}" ]; then
            ARGS="$ARGS --month ${{ github.event.inputs.month }}"
          fi
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            ARGS="$ARGS --mode ${{ github.event.inputs.mode }}"
          fi
          npm run start -- $ARGS
